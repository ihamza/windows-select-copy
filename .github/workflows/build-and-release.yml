name: Build and Release

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:
    inputs:
      version:
        description: 'Release version (e.g. 1.0.0)'
        required: true

permissions:
  contents: write

jobs:
  build:
    runs-on: windows-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '6.0.x'

      - name: Restore dependencies
        run: dotnet restore FileCopier/FileCopier.csproj

      - name: Build
        run: dotnet build FileCopier/FileCopier.csproj -c Release --no-restore

      - name: Publish self-contained exe
        run: >
          dotnet publish FileCopier/FileCopier.csproj
          -c Release
          -r win-x64
          --self-contained true
          -p:PublishSingleFile=true
          -p:IncludeNativeLibrariesForSelfExtract=true
          -o publish

      - name: Zip release artifacts
        run: Compress-Archive -Path publish\* -DestinationPath FileCopier-win-x64.zip

      - name: Determine version
        id: version
        shell: bash
        run: |
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            echo "tag=v${{ github.event.inputs.version }}" >> "$GITHUB_OUTPUT"
            echo "name=v${{ github.event.inputs.version }}" >> "$GITHUB_OUTPUT"
          else
            echo "tag=${{ github.ref_name }}" >> "$GITHUB_OUTPUT"
            echo "name=${{ github.ref_name }}" >> "$GITHUB_OUTPUT"
          fi

      - name: Create tag (manual dispatch only)
        if: github.event_name == 'workflow_dispatch'
        shell: bash
        run: |
          git tag "${{ steps.version.outputs.tag }}"
          git push origin "${{ steps.version.outputs.tag }}"

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.version.outputs.tag }}
          name: FileCopier ${{ steps.version.outputs.name }}
          body: |
            ## FileCopier ${{ steps.version.outputs.name }}

            Windows desktop application for copying files to a UNC network share.

            ### Installation
            1. Download `FileCopier-win-x64.zip` below
            2. Extract to any folder
            3. Run `FileCopier.exe`
            4. Edit `appsettings.json` to set your default remote path

            No .NET installation required — the app is fully self-contained.
          files: FileCopier-win-x64.zip
          draft: false
          prerelease: false
